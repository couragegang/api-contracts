# Общая модель ошибки API (все BC)
ErrorBody:
  type: object
  required: [code, message]
  properties:
    code:
      type: string
      description: Машиночитаемый код
      examples: [VALIDATION_ERROR, UNAUTHORIZED, FORBIDDEN, NOT_FOUND, CONFLICT]
    message:
      type: string
    details:
      type: object
      additionalProperties: true
