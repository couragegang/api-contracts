name: OpenAPI lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  redocly:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install -g @redocly/cli@1.25.0
      - run: redocly lint
