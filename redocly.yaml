extends:
  - recommended

apis:
  iam@v1:
    root: iam/openapi.yaml
  config@v1:
    root: config/openapi.yaml
  mcp@v1:
    root: mcp/openapi.yaml
  ai@v1:
    root: ai/openapi.yaml
  ai-orchestrator@v1:
    root: ai/orchestrator.yaml
  bff@v1:
    root: bff/openapi.yaml
  policy@v1:
    root: policy/openapi.yaml
  secrets@v1:
    root: secrets/openapi.yaml
  audit@v1:
    root: audit/openapi.yaml
  billing@v1:
    root: billing/openapi.yaml
  mcp-connectors-runtime@v1:
    root: mcp-connectors/runtime/openapi.yaml
  mcp-notion@v1:
    root: mcp-connectors/connectors/notion/openapi.yaml
  mcp-trello@v1:
    root: mcp-connectors/connectors/trello/openapi.yaml

rules:
  no-server-example.com: off
  info-license: off
  no-unused-components: warn
  operation-operationId: error
